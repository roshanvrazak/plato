apiVersion: apps/v1
kind: Deployment
metadata:
  name: plato-gateway
  labels:
    app: plato-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: plato-gateway
  template:
    metadata:
      labels:
        app: plato-gateway
    spec:
      containers:
      - name: gateway
        image: plato-gateway:dev
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 2
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: plato-gateway
spec:
  selector:
    app: plato-gateway
  ports:
  - port: 80
    targetPort: 8000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: plato-gateway
spec:
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: plato-gateway
            port:
              number: 80